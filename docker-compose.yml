services:
  postgres:
    image: postgres:16-alpine
    container_name: mental-model-generator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mental_model_generator
      POSTGRES_USER: mmg_user
      POSTGRES_PASSWORD: mmg_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmg_user -d mental_model_generator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
